name: Blue-Green Deploy — Department

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE:        dayasahu6077/department
  SERVICE:      department
  NAMESPACE:    microservices
  PREVIEW_SVC:  department-preview
  PREVIEW_PORT: "18081"

jobs:

  build:
    name: "1 · Build & Unit Test"
    runs-on: self-hosted
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        shell: pwsh
        run: |
          $tag = $env:GITHUB_SHA.Substring(0, 8)
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Image tag: $tag"

      - name: Run unit tests
        shell: pwsh
        run: |
          $workspace = "${{ github.workspace }}".Replace('\', '/')
          docker run --rm `
            -v "${workspace}:/workspace" `
            -w /workspace `
            maven:3.9.9-eclipse-temurin-21 `
            mvn -B test

      - name: Build Docker image
        shell: pwsh
        run: docker build -t "$env:IMAGE`:${{ steps.tag.outputs.tag }}" .

  integration-test:
    name: "2 · Integration Tests"
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run integration tests
        shell: pwsh
        run: |
          $workspace = "${{ github.workspace }}".Replace('\', '/')
          docker run --rm `
            -v "${workspace}:/workspace" `
            -w /workspace `
            maven:3.9.9-eclipse-temurin-21 `
            mvn -B verify -DskipUnitTests

  push-image:
    name: "3 · Push Image → Docker Hub"
    needs: integration-test
    runs-on: self-hosted
    steps:
      - name: Login to Docker Hub
        shell: pwsh
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      - name: Push image
        shell: pwsh
        run: docker push "$env:IMAGE`:${{ needs.build.outputs.image_tag }}"

  deploy-green:
    name: "4 · Deploy Green"
    needs: push-image
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Apply Rollout manifests
        shell: pwsh
        run: |
          kubectl apply -f k8/analysis-template.yaml -n $env:NAMESPACE
          kubectl apply -f k8/service-preview.yaml   -n $env:NAMESPACE
          kubectl delete deployment $env:SERVICE -n $env:NAMESPACE --ignore-not-found=true
          kubectl apply -f k8/rollout.yaml -n $env:NAMESPACE
      - name: Set green image
        shell: pwsh
        run: |
          kubectl argo rollouts set image $env:SERVICE `
            "$env:SERVICE=$env:IMAGE`:${{ needs.build.outputs.image_tag }}" `
            -n $env:NAMESPACE
      - name: Wait for green pods ready
        shell: pwsh
        run: |
          Start-Sleep 30
          kubectl argo rollouts get rollout $env:SERVICE -n $env:NAMESPACE

  smoke-test:
    name: "5 · Smoke Tests"
    needs: deploy-green
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Start port-forward
        shell: pwsh
        run: |
          $job = Start-Job { kubectl port-forward svc/department-preview 18081:8080 -n microservices }
          $job.Id | Out-File "$env:TEMP\pf_smoke_dept.txt"
          Start-Sleep 5

      - name: Run smoke tests
        shell: pwsh
        run: |
          $base = "http://localhost:$env:PREVIEW_PORT"
          $pass = 0; $fail = 0

          function Check($name, $expected, $actual) {
            if ($actual -eq $expected) { Write-Host "  ✅ $name"; $script:pass++ }
            else { Write-Host "  ❌ $name — expected '$expected' got '$actual'"; $script:fail++ }
          }

          Write-Host "`n🔍 Smoke tests → $base"

          Write-Host "1. Health / readiness"
          try { $r = Invoke-RestMethod "$base/actuator/health/readiness"; Check "status=UP" "UP" $r.status }
          catch { Check "status=UP" "UP" "UNREACHABLE" }

          Write-Host "2. GET /api/list"
          try { $r = Invoke-WebRequest "$base/api/list" -UseBasicParsing; Check "HTTP 200" "200" "$($r.StatusCode)" }
          catch { Check "HTTP 200" "200" "FAILED" }

          Write-Host "3. GET /api/envmsg"
          try { $r = Invoke-WebRequest "$base/api/envmsg" -UseBasicParsing; Check "HTTP 200" "200" "$($r.StatusCode)" }
          catch { Check "HTTP 200" "200" "FAILED" }

          Write-Host "Results: $pass passed, $fail failed"
          if ($fail -gt 0) { Write-Host "❌ Smoke tests FAILED"; exit 1 }
          Write-Host "✅ All smoke tests PASSED"

      - name: Stop port-forward
        if: always()
        shell: pwsh
        run: |
          $id = Get-Content "$env:TEMP\pf_smoke_dept.txt" -ErrorAction SilentlyContinue
          if ($id) { Stop-Job -Id $id -ErrorAction SilentlyContinue; Remove-Job -Id $id -Force -ErrorAction SilentlyContinue }

  performance-test:
    name: "6 · Performance Tests (k6)"
    needs: smoke-test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Start port-forward
        shell: pwsh
        run: |
          $job = Start-Job { kubectl port-forward svc/department-preview 18081:8080 -n microservices }
          $job.Id | Out-File "$env:TEMP\pf_perf_dept.txt"
          Start-Sleep 5
      - name: Run k6 load test
        shell: pwsh
        run: |
          $workspace = "${{ github.workspace }}".Replace('\', '/')
          docker run --rm `
            -v "${workspace}/tests/performance:/tests" `
            -e BASE_URL=http://host.docker.internal:$env:PREVIEW_PORT `
            grafana/k6 run /tests/load-test.js
      - name: Stop port-forward
        if: always()
        shell: pwsh
        run: |
          $id = Get-Content "$env:TEMP\pf_perf_dept.txt" -ErrorAction SilentlyContinue
          if ($id) { Stop-Job -Id $id -ErrorAction SilentlyContinue; Remove-Job -Id $id -Force -ErrorAction SilentlyContinue }

  e2e-test:
    name: "7 · E2E Tests (Newman)"
    needs: performance-test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Start port-forward
        shell: pwsh
        run: |
          $job = Start-Job { kubectl port-forward svc/department-preview 18081:8080 -n microservices }
          $job.Id | Out-File "$env:TEMP\pf_e2e_dept.txt"
          Start-Sleep 5
      - name: Run Newman E2E tests
        shell: pwsh
        run: |
          $workspace = "${{ github.workspace }}".Replace('\', '/')
          docker run --rm `
            -v "${workspace}/tests/e2e:/etc/newman" `
            postman/newman run /etc/newman/collection.json `
              --env-var "baseUrl=http://host.docker.internal:$env:PREVIEW_PORT" `
              --reporters cli
      - name: Stop port-forward
        if: always()
        shell: pwsh
        run: |
          $id = Get-Content "$env:TEMP\pf_e2e_dept.txt" -ErrorAction SilentlyContinue
          if ($id) { Stop-Job -Id $id -ErrorAction SilentlyContinue; Remove-Job -Id $id -Force -ErrorAction SilentlyContinue }

  approval:
    name: "8 · Manual Approval ✋"
    needs: e2e-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "✅ Approved. Promoting green → active."

  promote:
    name: "9 · Promote Green → Active 🚀"
    needs: approval
    runs-on: self-hosted
    steps:
      - name: Promote rollout
        shell: pwsh
        run: kubectl argo rollouts promote $env:SERVICE -n $env:NAMESPACE
      - name: Wait for promotion
        shell: pwsh
        run: kubectl argo rollouts status $env:SERVICE -n $env:NAMESPACE --timeout=60s
      - name: Summary
        shell: pwsh
        run: |
          Write-Host "🚀 Promotion complete — green is now live!"
          kubectl argo rollouts get rollout $env:SERVICE -n $env:NAMESPACE

  rollback:
    name: "⛔ Rollback to Blue"
    needs: [smoke-test, performance-test, e2e-test]
    if: failure()
    runs-on: self-hosted
    steps:
      - name: Abort and rollback
        shell: pwsh
        run: |
          Write-Host "❌ Tests failed — rolling back to blue..."
          kubectl argo rollouts abort $env:SERVICE -n $env:NAMESPACE
          kubectl argo rollouts undo  $env:SERVICE -n $env:NAMESPACE
          Write-Host "✅ Blue is still live."
